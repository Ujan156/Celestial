<!DOCTYPE html>
<html>
<head>
  <title>W.I.P</title>
  <style>body {
  margin: 0;
  height: 100vh;
  background: url("stars.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-family: 'Georgia', serif;
  text-align: center;
}

.wip-container {
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  padding: 60px;
  border-radius: 20px;
}

h1 {
  font-size: 48px;
  letter-spacing: 2px;
}

.back-btn {
  display: inline-block;
  margin-top: 40px;
  color: #a8cfff;
  text-decoration: none;
  font-size: 18px;
  transition: 0.3s;
}

.back-btn:hover {
  color: white;
  text-shadow: 0 0 10px #a8cfff;
}
.wip-container {
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

</style>
</head>
<body>

<div class="wip-container">
  <h1>Work In Progress</h1>
  <p>
    Beberapa kenangan masih menunggu waktunya.
  </p>
  <p>
    Cerita ini belum selesai.
  </p>

  <a href="index.html" class="back-btn">
    ← Back to Celestial
  </a>
</div>

</body>
</html>
